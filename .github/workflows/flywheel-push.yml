name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Don't persist the workflow's default GITHUB_TOKEN as a git
          # extraheader — it would shadow the App installation token that
          # semantic-release embeds in its push URL, and the workflow's
          # token only has read scope here.
          persist-credentials: false
      - uses: point-source/flywheel@a4ef65d6e6235e9944aed6a218f33fece51e9293
        id: flywheel
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
      - name: Run semantic-release
        if: steps.flywheel.outputs.managed_branch == 'true'
        # Plugins must be co-installed; npx will not resolve them from the
        # generated .releaserc.json on its own.
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/changelog \
            -p @semantic-release/exec \
            -p @semantic-release/git \
            -p @semantic-release/github \
            semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
      - name: Back-merge release into upstream branches
        # Only runs when this push triggered a release (a tag was created at
        # HEAD by semantic-release) and the stream has upstream branches.
        # Brings the CHANGELOG + release_files content from the chore(release)
        # commit into each upstream so the next prerelease cycle picks up
        # from a synced state. We deliberately do *not* mark the back-merge
        # commit `[skip ci]`: that token is a workflow-level filter, which
        # would leave required status checks `Pending` on any promotion PR
        # tracking the upstream branch. Adopters who want to skip CI work on
        # back-merge commits should use a job-level `if:` in their quality
        # workflows (which reports `success` and clears the gate).
        #
        # Mechanism (squash/rebase): under squash and rebase merge modes,
        # the released branch has no ancestral link to the upstream branch's
        # source commits — both branches independently produced
        # chore(release) commits that modified the same line ranges in
        # CHANGELOG.md and any release_files paths. A regular `git merge`
        # falls back to a too-distant merge-base and surfaces a
        # deterministic conflict on those files. We sidestep the conflict
        # by *taking* the released branch's version of every file the
        # chore(release) commit modified (main's post-release state is
        # canonical for those paths) and committing the result with a
        # flywheel-owned subject. The `ci(flywheel):` type is non-bumping
        # under default commit-analyzer rules, so the back-merge push does
        # not trigger a redundant release on the upstream branch.
        if: |
          steps.flywheel.outputs.managed_branch == 'true' &&
          steps.flywheel.outputs.back_merge_targets != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
          BACK_MERGE_TARGETS: ${{ steps.flywheel.outputs.back_merge_targets }}
          MERGE_STRATEGY: ${{ steps.flywheel.outputs.merge_strategy }}
          RELEASED_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          new_tags="$(git tag --points-at HEAD)"
          if [[ -z "$new_tags" ]]; then
            echo "::notice::No tag at HEAD — semantic-release did not publish a release. Skipping back-merge."
            exit 0
          fi
          new_tag="$(echo "$new_tags" | head -n1)"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          IFS=',' read -ra UPSTREAMS <<< "$BACK_MERGE_TARGETS"
          for upstream in "${UPSTREAMS[@]}"; do
            echo "::group::Back-merge $RELEASED_BRANCH ($new_tag) → $upstream"
            git fetch origin "$upstream:$upstream"
            git checkout "$upstream"
            case "$MERGE_STRATEGY" in
              squash|rebase)
                files=$(git diff-tree --no-commit-id --name-only -r "$RELEASED_BRANCH")
                if [[ -z "$files" ]]; then
                  echo "::warning::release commit has no diff — skipping back-merge for $upstream."
                  echo "::endgroup::"
                  continue
                fi
                # shellcheck disable=SC2086
                git checkout "$RELEASED_BRANCH" -- $files
                if git diff --cached --quiet; then
                  echo "$upstream already in sync with $RELEASED_BRANCH for release-managed paths."
                else
                  git commit -m "ci(flywheel): back-merge $new_tag from $RELEASED_BRANCH into $upstream

Flywheel-Back-Merge: $new_tag"
                fi
                ;;
              *)
                # Reserved for a future true-merge mode where ancestry is
                # preserved. Today's MergeStrategy enum is squash|rebase only.
                if git merge --ff-only "$RELEASED_BRANCH" 2>/dev/null; then
                  echo "Fast-forwarded $upstream to $RELEASED_BRANCH."
                else
                  git merge --no-ff -m "chore: back-merge $new_tag from $RELEASED_BRANCH into $upstream" "$RELEASED_BRANCH"
                fi
                ;;
            esac
            git push origin "$upstream"
            echo "::endgroup::"
          done
