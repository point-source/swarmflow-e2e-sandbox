name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Don't persist the workflow's default GITHUB_TOKEN as a git
          # extraheader — it would shadow the App installation token that
          # semantic-release embeds in its push URL, and the workflow's
          # token only has read scope here.
          persist-credentials: false
      - uses: point-source/flywheel@5e732d57b121c0a9d14388fcb1088505d537c05c
        id: flywheel
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
      - name: Run semantic-release
        if: steps.flywheel.outputs.managed_branch == 'true'
        # Plugins must be co-installed; npx will not resolve them from the
        # generated .releaserc.json on its own.
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/changelog \
            -p @semantic-release/exec \
            -p @semantic-release/git \
            -p @semantic-release/github \
            semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
      - name: Back-merge release into upstream branches
        # Only runs when this push triggered a release (a tag was created at
        # HEAD by semantic-release) and the stream has upstream branches.
        # Replays main's chore(release) commit + tag into each upstream via a
        # true `git merge` so ancestry is preserved and the next prerelease
        # cycle computes from a synced state. We deliberately do *not* mark
        # the back-merge commit `[skip ci]`: that token is a workflow-level
        # filter, which would leave required status checks `Pending` on any
        # promotion PR tracking the upstream branch. Adopters who want to
        # skip CI work on back-merge commits should use a job-level `if:` in
        # their quality workflows (which reports `success` and clears the
        # gate).
        if: |
          steps.flywheel.outputs.managed_branch == 'true' &&
          steps.flywheel.outputs.back_merge_targets != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
          BACK_MERGE_TARGETS: ${{ steps.flywheel.outputs.back_merge_targets }}
          RELEASED_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          new_tags="$(git tag --points-at HEAD)"
          if [[ -z "$new_tags" ]]; then
            echo "::notice::No tag at HEAD — semantic-release did not publish a release. Skipping back-merge."
            exit 0
          fi
          new_tag="$(echo "$new_tags" | head -n1)"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Configure git auth for fetch + push using the App installation token.
          # The checkout step ran with persist-credentials: false intentionally
          # (so the workflow's read-scope default GITHUB_TOKEN couldn't shadow
          # semantic-release's own push URL during step 3). The back-merge step
          # needs write scope, so set the extraheader explicitly here using the
          # App token (already exported as GITHUB_TOKEN). Mirror's actions/checkout's
          # mechanism. The runner is torn down after the job, so persisting in
          # .git/config has no security cost.
          auth_header="Authorization: Basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git config "http.https://github.com/.extraheader" "$auth_header"
          IFS=',' read -ra UPSTREAMS <<< "$BACK_MERGE_TARGETS"
          for upstream in "${UPSTREAMS[@]}"; do
            echo "::group::Back-merge $RELEASED_BRANCH ($new_tag) → $upstream"
            git fetch origin "$upstream:$upstream"
            git checkout "$upstream"
            if git merge --ff-only "$RELEASED_BRANCH" 2>/dev/null; then
              echo "Fast-forwarded $upstream to $RELEASED_BRANCH."
            else
              git merge --no-ff -m "chore: back-merge $new_tag from $RELEASED_BRANCH into $upstream" "$RELEASED_BRANCH"
            fi
            git push origin "$upstream"
            echo "::endgroup::"
          done
