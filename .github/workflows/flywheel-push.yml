name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Don't persist the workflow's default GITHUB_TOKEN as a git
          # extraheader — it would shadow the App installation token that
          # semantic-release embeds in its push URL, and the workflow's
          # token only has read scope here.
          persist-credentials: false
      - uses: point-source/flywheel@4befbad7db49472329fdddff0a55136de714fc2f
        id: flywheel
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
      - name: Run semantic-release
        if: steps.flywheel.outputs.managed_branch == 'true'
        # Plugins must be co-installed; npx will not resolve them from the
        # generated .releaserc.json on its own.
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/commit-analyzer@13 \
            -p @semantic-release/release-notes-generator@14 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/exec@7 \
            -p @semantic-release/git@10 \
            -p @semantic-release/github@11 \
            semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
      - name: Sanitize @-mentions in release body
        # Squash-commit messages often contain @-prefixed identifiers
        # (@semantic-release/exec, @v1 floating tag, @octokit/auth-app, …)
        # that GitHub's release-page renderer parses as user mentions and
        # surfaces in the release's "Contributors" sidebar — adding bogus
        # entries like a "v1" contributor. Wrap any @-mention left in the
        # body with backticks so GitHub leaves it as code text. See #70.
        if: steps.flywheel.outputs.managed_branch == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
        run: |
          set -euo pipefail
          new_tag="$(git tag --points-at HEAD | head -n1)"
          if [[ -z "$new_tag" ]]; then
            echo "::notice::No tag at HEAD — semantic-release did not publish a release. Skipping body sanitize."
            exit 0
          fi
          body="$(gh release view "$new_tag" --json body --jq .body)"
          # Wrap @<identifier> in backticks where the @ is at line-start or
          # after whitespace/punctuation that GitHub treats as a mention
          # boundary. Anything preceded by a word char (email-like
          # `user@host`) or by a backtick (already inline-coded) is left
          # alone. The class delimiter is `#` so `@` and `|` can appear
          # literally.
          sanitized="$(printf '%s' "$body" | sed -E 's#(^|[[:space:]([])@([A-Za-z0-9][A-Za-z0-9._/-]+)#\1`@\2`#g')"
          if [[ "$body" != "$sanitized" ]]; then
            gh release edit "$new_tag" --notes "$sanitized" --repo "$GITHUB_REPOSITORY" >/dev/null
            echo "Sanitized @-mentions in $new_tag release body."
          fi
      - name: Register Flywheel merge drivers
        # CHANGELOG.md and release_files paths are derived artifacts:
        # semantic-release writes them on each release, humans don't edit them.
        # When develop accumulates prereleases between promotions, both sides
        # of a back-merge have rewritten the same lines and `git merge` cannot
        # auto-resolve — that's issue #112.
        #
        # Two custom drivers eliminate the conflict surface:
        #   - flywheel-changelog: regenerates CHANGELOG.md from git tag
        #     history (conventional-changelog-cli with the angular preset
        #     semantic-release uses). Merge result is the union of both
        #     sides' tags; nothing is lost.
        #   - flywheel-release-file: `driver = true` is git's built-in
        #     "always accept ours" — safe for release_files because
        #     semantic-release rewrites them wholesale on the next run.
        #
        # Attributes go in .git/info/attributes (runtime, not committed)
        # so the rules apply even if the adopter's checked-in
        # .gitattributes is out of sync with their .flywheel.yml.
        if: steps.flywheel.outputs.managed_branch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config merge.flywheel-changelog.name "Flywheel CHANGELOG regenerator"
          git config merge.flywheel-changelog.driver \
            'bash -c "npx --yes conventional-changelog-cli@5 -p angular -r 0 > \"$1\"" -- %A'
          git config merge.flywheel-release-file.name "Flywheel release-file (keep ours)"
          git config merge.flywheel-release-file.driver true
          mkdir -p .git/info
          {
            echo "CHANGELOG.md merge=flywheel-changelog"
            if [[ -f .flywheel.yml ]]; then
              # One-liner because YAML's block-scalar indent rules conflict
              # with Python's significant indentation (a heredoc'd multi-line
              # script would either break YAML or break Python). PyYAML is
              # preinstalled on ubuntu-latest.
              python3 -c "import yaml; cfg=yaml.safe_load(open('.flywheel.yml')) or {}; files=(cfg.get('flywheel') or {}).get('release_files') or []; [print(e['path']+' merge=flywheel-release-file') for e in files if isinstance(e, dict) and e.get('path')]" 2>/dev/null || true
            fi
          } > .git/info/attributes
      - name: Back-merge release into upstream branches
        # Only runs when this push triggered a release (a tag was created at
        # HEAD by semantic-release) and the stream has upstream branches.
        # Replays main's chore(release) commit + tag into each upstream via a
        # true `git merge` so ancestry is preserved and the next prerelease
        # cycle computes from a synced state. We deliberately do *not* mark
        # the back-merge commit `[skip ci]`: that token is a workflow-level
        # filter, which would leave required status checks `Pending` on any
        # promotion PR tracking the upstream branch. Adopters who want to
        # skip CI work on back-merge commits should use a job-level `if:` in
        # their quality workflows (which reports `success` and clears the
        # gate).
        #
        # On unexpected conflict (the merge drivers should make CHANGELOG
        # and release_files conflict-free, so a failure here means a real
        # source divergence) we don't push the conflicted state to the
        # protected upstream branch. We commit the markers on a throwaway
        # branch and open a flywheel:needs-review PR instead — the previous
        # behavior was to exit non-zero and stall silently until the next
        # promotion surfaced the divergence (#112).
        if: |
          steps.flywheel.outputs.managed_branch == 'true' &&
          steps.flywheel.outputs.back_merge_targets != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
          BACK_MERGE_TARGETS: ${{ steps.flywheel.outputs.back_merge_targets }}
          RELEASED_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          new_tags="$(git tag --points-at HEAD)"
          if [[ -z "$new_tags" ]]; then
            echo "::notice::No tag at HEAD — semantic-release did not publish a release. Skipping back-merge."
            exit 0
          fi
          new_tag="$(echo "$new_tags" | head -n1)"
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Configure git auth for fetch + push using the App installation token.
          # The checkout step ran with persist-credentials: false intentionally
          # (so the workflow's read-scope default GITHUB_TOKEN couldn't shadow
          # semantic-release's own push URL during step 3). The back-merge step
          # needs write scope, so set the extraheader explicitly here using the
          # App token (already exported as GITHUB_TOKEN). Mirror's actions/checkout's
          # mechanism. The runner is torn down after the job, so persisting in
          # .git/config has no security cost.
          auth_header="Authorization: Basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git config "http.https://github.com/.extraheader" "$auth_header"
          # Slugify tag for use in branch names (strip stream/v prefix slash etc.).
          safe_tag="${new_tag//[^A-Za-z0-9._-]/-}"
          IFS=',' read -ra UPSTREAMS <<< "$BACK_MERGE_TARGETS"
          for upstream in "${UPSTREAMS[@]}"; do
            echo "::group::Back-merge $RELEASED_BRANCH ($new_tag) → $upstream"
            git fetch origin "$upstream:$upstream"
            # Operate on a throwaway local branch — we only push to the
            # protected upstream when the merge lands clean. Conflicted
            # states get pushed to a separate PR branch instead.
            git checkout -B _flywheel_back_merge_tmp "$upstream"
            if git merge --ff-only "$RELEASED_BRANCH" 2>/dev/null; then
              git push origin "_flywheel_back_merge_tmp:$upstream"
              echo "Fast-forwarded $upstream to $RELEASED_BRANCH."
            elif git merge --no-ff -m "chore: back-merge $new_tag from $RELEASED_BRANCH into $upstream" "$RELEASED_BRANCH"; then
              git push origin "_flywheel_back_merge_tmp:$upstream"
              echo "Auto-merged $RELEASED_BRANCH into $upstream."
            else
              echo "::warning::back-merge of $new_tag into $upstream failed; opening review PR."
              pr_branch="chore/back-merge-${safe_tag}-into-${upstream}"
              existing="$(gh pr list --head "$pr_branch" --base "$upstream" --state open --json number --jq '.[0].number' 2>/dev/null || true)"
              if [[ -n "$existing" ]]; then
                echo "::notice::back-merge PR #$existing already open for $upstream — skipping."
                git merge --abort 2>/dev/null || true
              else
                # `git commit` refuses to commit unresolved conflicts. `git
                # add -A` followed by `commit --no-verify` works — the
                # resulting commit literally contains the conflict markers,
                # which is what we want the PR reviewer to resolve.
                git add -A
                git commit --no-verify -m "chore: back-merge $new_tag from $RELEASED_BRANCH into $upstream (CONFLICT — manual resolution needed)"
                git push -f origin "_flywheel_back_merge_tmp:$pr_branch"
                gh pr create \
                  --base "$upstream" \
                  --head "$pr_branch" \
                  --title "chore: back-merge $new_tag from $RELEASED_BRANCH into $upstream" \
                  --label "flywheel:needs-review" \
                  --body "Automatic back-merge of \`$new_tag\` from \`$RELEASED_BRANCH\` into \`$upstream\` failed. Resolve the conflicts and merge to keep the branches in sync."
              fi
            fi
            echo "::endgroup::"
          done
