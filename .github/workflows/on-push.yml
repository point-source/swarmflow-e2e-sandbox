# Entrypoint: push events to managed branches.
# Fires after a PR is merged (the merge commit lands on the branch).
# This file is identical across all adopting repos. Copy it as-is.
#
# Note: this WILL fire for pushes by the GitHub App bot (which uses an
# installation token, not GITHUB_TOKEN), enabling the promotion and
# release chain to continue automatically.

name: Pipeline — Push

on:
  push:
    branches:
      - main
      - staging
      - develop

# One promotion/release run per branch at a time. A second push (e.g. two
# PRs merging in quick succession) queues rather than cancels — we don't
# want to drop a release trigger.
concurrency:
  group: pipeline-push-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  orchestrate:
    uses: point-source/swarmflow/.github/workflows/orchestrator.yml@28632ca977fe0b82903546ece6abf127d8426680
    with:
      event_type: push
      source_branch: ${{ github.ref_name }}
      target_branch: ${{ github.ref_name }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
