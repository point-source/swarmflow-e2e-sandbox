# Entrypoint: push events to managed branches.
# Fires after a PR is merged (the merge commit lands on the branch).
# This file is identical across all adopting repos. Copy it as-is.
#
# Note: this WILL fire for pushes by the GitHub App bot (which uses an
# installation token, not GITHUB_TOKEN), enabling the promotion and
# release chain to continue automatically.

name: Pipeline — Push

on:
  push:
    branches:
      - main
      - staging
      - develop

# Permissions granted to the called orchestrator chain. GitHub validates
# every workflow_call target at load time — even ones gated by `if:` that
# never run for this event — so the caller must cover the union of all
# pipeline workflows: pr-lifecycle, promote, and release.
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write

# One promotion/release run per branch at a time. A second push (e.g. two
# PRs merging in quick succession) queues rather than cancels — we don't
# want to drop a release trigger.
concurrency:
  group: pipeline-push-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  orchestrate:
    uses: point-source/swarmflow/.github/workflows/orchestrator.yml@ef5f00e2ce736de34f48430ec94f3b75f55eaeca
    with:
      event_type: push
      source_branch: ${{ github.ref_name }}
      target_branch: ${{ github.ref_name }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
