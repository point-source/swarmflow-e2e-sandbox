# Entrypoint: push events to managed branches.
# Fires after a PR is merged (the merge commit lands on the branch).
# This file is identical across all adopting repos. Copy it as-is.

name: Pipeline — Push
on:
  push:
    branches:
      - main
      - staging
      - develop
# GitHub validates every workflow_call target eagerly at load time, so the
# caller must grant the union of permissions across all branches' chains
# (pr-lifecycle, promote, release). Removing any of these will cause a
# startup_failure.
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write
# One promotion/release run per branch at a time. Don't cancel — losing a
# release trigger is worse than queueing a few seconds.
concurrency:
  group: pipeline-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  orchestrate:
    uses: point-source/swarmflow/.github/workflows/orchestrator.yml@4ff8905f1dc10bc25c2fb7eae09d705cefaa7769
    with:
      event_type: push
      source_branch: ${{ github.ref_name }}
      target_branch: ${{ github.ref_name }}
      swarmflow_repo: point-source/swarmflow
      swarmflow_ref: 4ff8905f1dc10bc25c2fb7eae09d705cefaa7769
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
