name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string
      changelog:
        required: true
        type: string
      artifact_path:
        required: false
        type: string
        default: dist/

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: echo "publish $INPUTS"
        env:
          INPUTS: ${{ toJson(inputs) }}
