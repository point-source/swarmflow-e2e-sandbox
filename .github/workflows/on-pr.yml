# Entrypoint: pull request events on managed branches.
# This file is identical across all adopting repos. Copy it as-is.

name: Pipeline — PR
on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
# GitHub validates every workflow_call target eagerly at load time, so the
# caller must grant the union of permissions across all branches' chains
# (pr-lifecycle, promote, release). Removing any of these will cause a
# startup_failure.
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write
# Cancel any in-progress run for the same PR when a new commit arrives.
concurrency:
  group: pipeline-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  orchestrate:
    if: github.event.pull_request.draft == false
    uses: point-source/swarmflow/.github/workflows/orchestrator.yml@82d9e64bb789dfd00879659ac04036a1a7f54559
    with:
      event_type: >-
        ${{

          (github.event.action == 'opened' || github.event.action == 'reopened') && 'pr_opened' ||
          github.event.action == 'synchronize' && 'pr_updated' ||
          'pr_opened'
        }}
      source_branch: ${{ github.head_ref }}
      target_branch: ${{ github.base_ref }}
      pr_number: ${{ github.event.pull_request.number }}
      swarmflow_repo: point-source/swarmflow
      swarmflow_ref: 82d9e64bb789dfd00879659ac04036a1a7f54559
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
